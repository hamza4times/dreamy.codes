<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dreamy Codes</title>
</head>

<body>
  <div class="editor-container">

    <div id="file-tabs">
      <button id="js-btn">Javascript</button>
      <button id="html-btn">HTML</button>
      <button id="css-btn">CSS</button>
    </div>

    <div id="editor">
    </div>

  </div>

  <div id="ai-chat-container">

    <div id="message-container">
      
    </div>
    
    <select id="model-select">
        <option value="openrouter/owl-alpha">Owl Alpha</option>
        <option value="deepseek/deepseek-v4-flash:free">DeepSeek V4 Flash</option>
        <option value="qwen/qwen3-coder:free">Qwen3 Coder 480B A35B</option>
        <option value="nvidia/nemotron-3-ultra-550b-a55b:free">Nemotron 3 Ultra</option>
        <option value="nex-agi/nex-n2-pro:free">Nex-N2-Pro</option>
        <option value="poolside/laguna-m.1:free">Laguna M.1</option>
        <option value="nvidia/nemotron-3-super-120b-a12b:free">Nemotron 3 Super</option>
        <option value="openai/gpt-oss-120b:free">GPT OSS 120B</option>
        <option value="poolside/laguna-xs.2:free">Laguna XS.2</option>
        <option value="openai/gpt-oss-20b:free">GPT OSS 20B</option>
        <option value="google/gemma-4-31b-it:free">Gemma 4 31B</option>
        <option value="nvidia/nemotron-3-nano-30b-a3b:free">Nemotron Nano 30B</option>
        <option value="google/gemma-4-26b-a4b-it:free">Gemma 4 26B</option>
      </select>

    <div id="ai-chat-container-bottom">
      <input id="ai-chat-input" placeholder="start chatting">
      <button id="chat-ai-button">⏩</button>
    
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
